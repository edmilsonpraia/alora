<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Pergunta 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f5f7fa;
        }
        .qr-card {
            background: #fff;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 3px solid #5C6BC0;
        }
        .event-logo {
            max-width: 120px;
            margin-bottom: 15px;
        }
        .event-title {
            font-size: 1rem;
            color: #00897B;
            font-weight: 600;
            margin-bottom: 25px;
        }
        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #5C6BC0 0%, #3949AB 100%);
            color: #fff;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .qr-container {
            margin: 20px auto;
            padding: 15px;
            background: #fff;
            border-radius: 12px;
            display: inline-block;
        }
        .qr-container img {
            display: block;
        }
        .question-text {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.5;
            margin: 20px 0 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #5C6BC0;
            text-align: left;
        }
        .scan-instruction {
            font-size: 0.9rem;
            color: #888;
            margin-top: 15px;
            font-style: italic;
        }
        .scan-instruction i {
            margin-right: 5px;
            color: #5C6BC0;
        }
        .link-display {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 10px;
            word-break: break-all;
        }
        @media print {
            body { background: #fff; }
            .qr-card {
                box-shadow: none;
                border: 3px solid #5C6BC0;
                page-break-inside: avoid;
            }
        }
        @media (max-width: 480px) {
            .qr-card { margin: 10px; padding: 30px 20px; }
            .question-number { font-size: 1.2rem; padding: 8px 24px; }
        }
    </style>
</head>
<body>
    <div class="qr-card">
        <img src="../logotipo.png" alt="Logo Allora" class="event-logo">
        <div class="event-title">2º Fórum Nacional de Negócios Sustentáveis</div>

        <div class="question-number">PERGUNTA 1</div>

        <div class="qr-container" id="qrCode"></div>

        <div class="question-text">
            <strong>Na sua opinião que factores do passado influenciaram a forma como hoje pensamos sobre sustentabilidade e desenvolvimento económico?</strong>
        </div>

        <div class="scan-instruction">
            <i class="fas fa-mobile-alt"></i> Aponte a câmara do telemóvel para o código QR
        </div>

        <div class="link-display" id="linkDisplay"></div>
    </div>

    <script>
        // Determinar URL base automaticamente
        const currentUrl = window.location.href;
        const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
        const questionUrl = baseUrl + '/index.html';

        // Gerar QR Code
        const qr = qrcode(0, 'M');
        qr.addData(questionUrl);
        qr.make();

        document.getElementById('qrCode').innerHTML = qr.createImgTag(6, 10);
        document.getElementById('linkDisplay').textContent = questionUrl;
    </script>
</body>
</html>
