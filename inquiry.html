<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquérito: 2º Fórum Nacional de Negócios Sustentáveis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos específicos para a página do inquérito */
        .survey-only-wrapper {
            max-width: 800px;
            margin: 20px auto;
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px 50px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .section-title i {
            color: #26A69A;
            margin-right: 10px;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
            box-sizing: border-box;
        }

        .form-group input[type="text"]:focus {
            border-color: #26A69A;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(38, 166, 154, 0.1);
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-group label {
            display: flex;
            align-items: flex-start;
            padding: 14px 16px;
            background: #fafafa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 400;
            margin-bottom: 0;
            font-size: 0.95rem;
        }

        .radio-group label:hover {
            background: #f0f9f8;
            border-color: #26A69A;
        }

        .radio-group input[type="radio"] {
            margin-right: 12px;
            margin-top: 2px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #26A69A;
        }

        .radio-group label:has(input[type="radio"]:checked) {
            background: #e8f5f3;
            border-color: #26A69A;
            font-weight: 500;
        }

        .form-footer {
            margin-top: 40px;
            text-align: center;
        }

        .form-footer button {
            background: linear-gradient(135deg, #26A69A 0%, #00897B 100%);
            color: white;
            padding: 14px 40px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
            max-width: 300px;
        }

        .form-footer button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(38, 166, 154, 0.4);
        }

        .form-footer button:active {
            transform: translateY(0);
        }

        .admin-compact {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        /* Responsividade Mobile */
        @media (max-width: 768px) {
            .survey-only-wrapper {
                margin: 10px;
                padding: 30px 20px;
                border-radius: 12px;
            }

            .section-title {
                font-size: 1.2rem;
                margin-bottom: 25px;
            }

            .form-group {
                margin-bottom: 25px;
            }

            .form-group label {
                font-size: 0.9rem;
                margin-bottom: 10px;
            }

            .form-group input[type="text"] {
                padding: 12px 14px;
                font-size: 0.95rem;
            }

            .radio-group {
                gap: 8px;
            }

            .radio-group label {
                padding: 12px 14px;
                font-size: 0.88rem;
                line-height: 1.4;
            }

            .radio-group input[type="radio"] {
                width: 16px;
                height: 16px;
                margin-right: 10px;
            }

            .form-footer {
                margin-top: 35px;
            }

            .form-footer button {
                padding: 14px 30px;
                font-size: 0.95rem;
                max-width: 100%;
            }

            .event-header h1 {
                font-size: 1.3rem;
            }

            .event-header .subtitle {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .survey-only-wrapper {
                margin: 5px;
                padding: 25px 15px;
            }

            .section-title {
                font-size: 1.1rem;
            }

            .form-group label {
                font-size: 0.85rem;
            }

            .radio-group label {
                font-size: 0.82rem;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>

    <header class="event-header">
        <div class="header-content">
            <img src="logotipo.png" alt="Logo Allora" class="logo">
            <h1>2º Fórum Nacional de Negócios Sustentáveis</h1>
            <p class="subtitle">"Desenhando um futuro sustentável" - 20 de Fevereiro de 2026</p>
        </div>
    </header>

    <div class="survey-only-wrapper">
        <h2 class="section-title"><i class="fas fa-edit"></i> Inquérito de Participação</h2>

        <form id="surveyForm" class="survey-form" novalidate>

            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Digite o seu nome completo" required>
                <small class="error-message">Por favor, insira o seu nome completo.</small>
            </div>

            <div class="form-group">
                <label>1. Hoje, em Angola, a sustentabilidade é praticada principalmente porque:</label>
                <div class="radio-group">
                    <label><input type="radio" name="pratica_sustentabilidade" value="Conviccao_estrategica" required> É uma convicção estratégica para o desenvolvimento do país</label>
                    <label><input type="radio" name="pratica_sustentabilidade" value="Exigencia_internacional"> É exigida por parceiros internacionais e investidores</label>
                    <label><input type="radio" name="pratica_sustentabilidade" value="Melhora_imagem"> Melhora a imagem institucional de empresas e entidades</label>
                    <label><input type="radio" name="pratica_sustentabilidade" value="Nao_prioridade"> Ainda não é, de facto, uma prioridade nacional</label>
                </div>
            </div>

            <div class="form-group">
                <label>2. Na prática, o maior travão para a sustentabilidade em Angola hoje é:</label>
                <div class="radio-group">
                    <label><input type="radio" name="travao_sustentabilidade" value="Falta_lideranca" required> Falta de liderança e decisão política/empresarial</label>
                    <label><input type="radio" name="travao_sustentabilidade" value="Falta_consciencia"> Falta de consciência e educação da sociedade</label>
                    <label><input type="radio" name="travao_sustentabilidade" value="Falta_financiamento"> Falta de financiamento e incentivos económicos</label>
                    <label><input type="radio" name="travao_sustentabilidade" value="Falta_confianca"> Falta de confiança de que sustentabilidade gera retorno económico</label>
                </div>
            </div>

            <div class="form-group">
                <label>3. Durante anos, em Angola, nunca ligámos muito às emissões porque:</label>
                <div class="radio-group">
                    <label><input type="radio" name="emissoes_angola" value="Outras_prioridades" required> Tínhamos outras prioridades mais urgentes</label>
                    <label><input type="radio" name="emissoes_angola" value="Problema_outros"> Sempre achámos que poluição era problema "dos outros países"</label>
                    <label><input type="radio" name="emissoes_angola" value="Nunca_explicaram"> Nunca nos explicaram o impacto real no nosso dia a dia</label>
                    <label><input type="radio" name="emissoes_angola" value="Nao_pensamos"> Ainda hoje quase não pensamos nisso</label>
                </div>
            </div>

            <div class="form-group">
                <label>4. No nosso dia a dia, o que mais contribui para emissões em Angola é:</label>
                <div class="radio-group">
                    <label><input type="radio" name="contribui_emissoes" value="Transito_transportes" required> O trânsito e os transportes informais (táxis, candongueiros)</label>
                    <label><input type="radio" name="contribui_emissoes" value="Uso_ineficiente"> O uso ineficiente de energia e combustível</label>
                    <label><input type="radio" name="contribui_emissoes" value="Agua_eletricidade"> A forma como usamos água, eletricidade e resíduos</label>
                    <label><input type="radio" name="contribui_emissoes" value="Nunca_pensei"> Nunca pensei nisso desta forma</label>
                </div>
            </div>

            <div class="form-group">
                <label>5. Daqui a 5 anos, as empresas que não integrarem sustentabilidade e ESG de forma séria irão:</label>
                <div class="radio-group">
                    <label><input type="radio" name="futuro_empresas" value="Perder_competitividade" required> Perder competitividade e relevância</label>
                    <label><input type="radio" name="futuro_empresas" value="Sobreviver_limitacoes"> Sobreviver, mas com grandes limitações</label>
                    <label><input type="radio" name="futuro_empresas" value="Manter_iguais"> Manter-se praticamente iguais</label>
                    <label><input type="radio" name="futuro_empresas" value="Sem_impactos"> Não sofrer impactos relevantes</label>
                </div>
            </div>

            <div class="form-footer">
                <button type="submit"><i class="fas fa-paper-plane"></i> ENVIAR INQUÉRITO</button>
                <div id="successMessage" class="success-message">
                    <strong>Muito obrigado!</strong> A sua resposta foi registada com sucesso.
                </div>
            </div>

        </form>

        <!-- Painel Admin -->
        <div class="admin-compact">
            <button id="toggleAdminBtn" class="btn-admin">
                <i class="fas fa-cog"></i> Painel Admin
            </button>
            <div id="adminPanel" class="admin-panel-compact" style="display: none;">
                <p>Total: <strong id="submissionCount">0</strong> respostas reais</p>
                <div class="admin-actions-compact">
                    <button id="downloadCsvBtn" class="btn-small"><i class="fas fa-download"></i> CSV</button>
                    <button id="downloadReportBtn" class="btn-small"><i class="fas fa-file-pdf"></i> PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
