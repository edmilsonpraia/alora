<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquérito: 2º Fórum Nacional de Negócios Sustentáveis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos específicos para a página do inquérito */
        .survey-only-wrapper {
            max-width: 700px;
            margin: 40px auto;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .page-nav {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav-link {
            display: inline-block;
            margin: 0 10px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #26A69A 0%, #00897B 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(38, 166, 154, 0.3);
        }

        .nav-link i {
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <header class="event-header">
        <div class="header-content">
            <img src="logotipo.png" alt="Logo Allora" class="logo">
            <h1>2º Fórum Nacional de Negócios Sustentáveis</h1>
            <p class="subtitle">"Desenhando um futuro sustentável" - 20 de Fevereiro de 2026</p>
        </div>
    </header>

    <div class="survey-only-wrapper">
        <h2 class="section-title"><i class="fas fa-edit"></i> Inquérito de Participação</h2>

        <form id="surveyForm" class="survey-form" novalidate>

            <div class="form-group">
                <label for="nome">1. Nome Completo</label>
                <input type="text" id="nome" name="nome" required>
                <small class="error-message">Por favor, insira o seu nome completo.</small>
            </div>

            <div class="form-group">
                <label for="email">2. E-mail</label>
                <input type="email" id="email" name="email" required>
                <small class="error-message">Por favor, insira um e-mail válido.</small>
            </div>

            <div class="form-group">
                <label>3. Qual o seu principal interesse no fórum?</label>
                <div class="radio-group">
                    <label><input type="radio" name="interesse" value="Networking" required> <strong>Networking:</strong> Conectar-me com parceiros e profissionais da área</label>
                    <label><input type="radio" name="interesse" value="Conhecimento"> <strong>Conhecimento:</strong> Aprender sobre negócios sustentáveis e tendências</label>
                    <label><input type="radio" name="interesse" value="Oportunidades"> <strong>Oportunidades:</strong> Descobrir novas oportunidades de negócio</label>
                    <label><input type="radio" name="interesse" value="Inovacao"> <strong>Inovação:</strong> Conhecer soluções inovadoras e tecnologias</label>
                </div>
            </div>

            <div class="form-group">
                <label>4. Formato de participação preferido:</label>
                <div class="radio-group">
                    <label><input type="radio" name="formato_participacao" value="Presencial" required> Presencial</label>
                    <label><input type="radio" name="formato_participacao" value="Online"> Online</label>
                    <label><input type="radio" name="formato_participacao" value="Hibrido"> Híbrido (flexível)</label>
                </div>
            </div>

            <div class="form-group">
                <label>5. Hoje, em Angola, a sustentabilidade é praticada principalmente porque:</label>
                <div class="radio-group">
                    <label><input type="radio" name="pratica_sustentabilidade" value="Conviccao_estrategica" required> <strong>A.</strong> É uma convicção estratégica para o desenvolvimento do país</label>
                    <label><input type="radio" name="pratica_sustentabilidade" value="Exigencia_internacional"> <strong>B.</strong> É exigida por parceiros internacionais e investidores</label>
                    <label><input type="radio" name="pratica_sustentabilidade" value="Melhora_imagem"> <strong>C.</strong> Melhora a imagem institucional de empresas e entidades</label>
                    <label><input type="radio" name="pratica_sustentabilidade" value="Nao_prioridade"> <strong>D.</strong> Ainda não é, de facto, uma prioridade nacional</label>
                </div>
            </div>

            <div class="form-group">
                <label>6. Na prática, o maior travão para a sustentabilidade em Angola hoje é:</label>
                <div class="radio-group">
                    <label><input type="radio" name="travao_sustentabilidade" value="Falta_lideranca" required> <strong>A.</strong> Falta de liderança e decisão política/empresarial</label>
                    <label><input type="radio" name="travao_sustentabilidade" value="Falta_consciencia"> <strong>B.</strong> Falta de consciência e educação da sociedade</label>
                    <label><input type="radio" name="travao_sustentabilidade" value="Falta_financiamento"> <strong>C.</strong> Falta de financiamento e incentivos económicos</label>
                    <label><input type="radio" name="travao_sustentabilidade" value="Falta_confianca"> <strong>D.</strong> Falta de confiança de que sustentabilidade gera retorno económico</label>
                </div>
            </div>

            <div class="form-group">
                <label>7. Durante anos, em Angola, nunca ligámos muito às emissões porque:</label>
                <div class="radio-group">
                    <label><input type="radio" name="emissoes_angola" value="Outras_prioridades" required> <strong>A.</strong> Tínhamos outras prioridades mais urgentes</label>
                    <label><input type="radio" name="emissoes_angola" value="Problema_outros"> <strong>B.</strong> Sempre achámos que poluição era problema "dos outros países"</label>
                    <label><input type="radio" name="emissoes_angola" value="Nunca_explicaram"> <strong>C.</strong> Nunca nos explicaram o impacto real no nosso dia a dia</label>
                    <label><input type="radio" name="emissoes_angola" value="Nao_pensamos"> <strong>D.</strong> Ainda hoje quase não pensamos nisso</label>
                </div>
            </div>

            <div class="form-group">
                <label>8. No nosso dia a dia, o que mais contribui para emissões em Angola é:</label>
                <div class="radio-group">
                    <label><input type="radio" name="contribui_emissoes" value="Transito_transportes" required> <strong>A.</strong> O trânsito e os transportes informais (táxis, candongueiros)</label>
                    <label><input type="radio" name="contribui_emissoes" value="Uso_ineficiente"> <strong>B.</strong> O uso ineficiente de energia e combustível</label>
                    <label><input type="radio" name="contribui_emissoes" value="Agua_eletricidade"> <strong>C.</strong> A forma como usamos água, eletricidade e resíduos</label>
                    <label><input type="radio" name="contribui_emissoes" value="Nunca_pensei"> <strong>D.</strong> Nunca pensei nisso desta forma</label>
                </div>
            </div>

            <div class="form-group">
                <label>9. Daqui a 5 anos, as empresas que não integrarem sustentabilidade e ESG de forma séria irão:</label>
                <div class="radio-group">
                    <label><input type="radio" name="futuro_empresas" value="Perder_competitividade" required> <strong>A.</strong> Perder competitividade e relevância</label>
                    <label><input type="radio" name="futuro_empresas" value="Sobreviver_limitacoes"> <strong>B.</strong> Sobreviver, mas com grandes limitações</label>
                    <label><input type="radio" name="futuro_empresas" value="Manter_iguais"> <strong>C.</strong> Manter-se praticamente iguais</label>
                    <label><input type="radio" name="futuro_empresas" value="Sem_impactos"> <strong>D.</strong> Não sofrer impactos relevantes</label>
                </div>
            </div>

            <div class="form-footer">
                <button type="submit"><i class="fas fa-paper-plane"></i> ENVIAR INQUÉRITO</button>
                <div id="successMessage" class="success-message">
                    <strong>Muito obrigado!</strong> A sua resposta foi registada com sucesso.
                </div>
            </div>

        </form>

        <!-- Painel Admin -->
        <div class="admin-compact">
            <button id="toggleAdminBtn" class="btn-admin">
                <i class="fas fa-cog"></i> Painel Admin
            </button>
            <div id="adminPanel" class="admin-panel-compact" style="display: none;">
                <p>Total: <strong id="submissionCount">0</strong> respostas reais</p>
                <div class="admin-actions-compact">
                    <button id="downloadCsvBtn" class="btn-small"><i class="fas fa-download"></i> CSV</button>
                    <button id="downloadReportBtn" class="btn-small"><i class="fas fa-file-pdf"></i> PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
