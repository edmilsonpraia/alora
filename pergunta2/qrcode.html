<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Pergunta 2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f5f7fa;
        }
        .qr-card {
            background: #fff;
            border-radius: 24px;
            padding: 60px 60px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 750px;
            width: 100%;
            border: 4px solid #FF9800;
        }
        .event-logo {
            max-width: 160px;
            margin-bottom: 18px;
        }
        .event-title {
            font-size: 1.4rem;
            color: #00897B;
            font-weight: 700;
            margin-bottom: 25px;
        }
        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #FF9800 0%, #EF6C00 100%);
            color: #fff;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        .qr-container {
            margin: 25px auto;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            display: inline-block;
        }
        .qr-container img {
            display: block;
        }
        .question-text {
            font-size: 1.25rem;
            color: #444;
            line-height: 1.6;
            margin: 25px 0 20px;
            padding: 20px 25px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 5px solid #FF9800;
            text-align: left;
        }
        .scan-instruction {
            font-size: 1.15rem;
            color: #777;
            margin-top: 20px;
            font-style: italic;
        }
        .scan-instruction i {
            margin-right: 6px;
            color: #FF9800;
        }
        .link-display {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 12px;
            word-break: break-all;
        }
        @media print {
            body { background: #fff; }
            .qr-card {
                box-shadow: none;
                border: 3px solid #FF9800;
                page-break-inside: avoid;
            }
        }
        @media (max-width: 480px) {
            .qr-card { margin: 10px; padding: 30px 20px; }
            .question-number { font-size: 1.2rem; padding: 8px 24px; }
        }
    </style>
</head>
<body>
    <div class="qr-card">
        <img src="../logotipo.png" alt="Logo Allora" class="event-logo">
        <div class="event-title">2º Fórum Nacional de Negócios Sustentáveis</div>

        <div class="question-number">PERGUNTA 2</div>

        <div class="qr-container" id="qrCode"></div>

        <div class="question-text">
            <strong>Na sua opinião, qual é hoje o maior obstáculo para a implementação de práticas sustentáveis nos negócios em Angola?</strong>
        </div>

        <div class="scan-instruction">
            <i class="fas fa-mobile-alt"></i> Aponte a câmara do telemóvel para o código QR
        </div>

        <div class="link-display" id="linkDisplay"></div>
    </div>

    <script>
        const currentUrl = window.location.href;
        const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
        const questionUrl = baseUrl + '/index.html';

        const qr = qrcode(0, 'M');
        qr.addData(questionUrl);
        qr.make();

        document.getElementById('qrCode').innerHTML = qr.createImgTag(10, 12);
        document.getElementById('linkDisplay').textContent = questionUrl;
    </script>
</body>
</html>
